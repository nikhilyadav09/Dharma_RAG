services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dharma-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ancient_wisdoms
    ports:
      - "5432:5432"
    volumes:
      - dharma_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ancient_wisdoms"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  dharma_pg_data:
